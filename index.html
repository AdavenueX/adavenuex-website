<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdAvenueX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0b0f1a,#0f1f3d);
color:white;
overflow-x:hidden;
cursor:none;
}

/* CURSOR */
.cursor{
width:20px;height:20px;
border:2px solid #00ffd5;
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:999;
}

/* NAVBAR */
header{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:10;
}

nav a{
margin:0 15px;
color:white;
text-decoration:none;
}
nav a:hover{color:#00ffd5;}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
text-align:center;
}

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:-1;
}

.welcome{font-size:70px;}
.hero h1{font-size:50px;}

.btn{
margin-top:20px;
padding:12px 30px;
background:#00ffd5;
color:black;
border-radius:30px;
text-decoration:none;
}

/* INFLUENCER */
.influencer-section{
padding:100px 20px;
background:linear-gradient(135deg,#120b1f,#1f0f3d);
}

.influencer-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.influencer-card{
width:180px;height:320px;
overflow:hidden;
border-radius:15px;
transition:0.3s;
}
.influencer-card:hover{
transform:scale(1.1);
}
.influencer-card img{
width:100%;
height:100%;
object-fit:cover;
}

/* 🔥 BRANDS */
.brands{
padding:80px 0;
background:#000;
overflow:hidden;
}

.slider{
display:flex;
gap:60px;
width:max-content;
animation:scroll 25s linear infinite;
}

.slider img{
width:140px;
filter:grayscale(100%);
opacity:0.7;
transition:0.3s;
}
.slider img:hover{
filter:grayscale(0);
opacity:1;
transform:scale(1.2);
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* CONTACT */
.contact{
background:#08101f;
padding:60px;
text-align:center;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:20px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
color:#aaa;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<header>
<h2>AdAvenueX</h2>
<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div id="particles-js"></div>

<div class="welcome">Welcome 👋</div>
<h1>Scale Your Brand 🚀</h1>
<p>We help brands grow with powerful influencers</p>
<a href="#" class="btn">Get Started</a>
</section>

<!-- INFLUENCER -->
<section class="influencer-section">
<div class="influencer-container">

<img class="influencer-card" src="https://picsum.photos/200/300?1">
<img class="influencer-card" src="https://picsum.photos/200/300?2">
<img class="influencer-card" src="https://picsum.photos/200/300?3">
<img class="influencer-card" src="https://picsum.photos/200/300?4">
<img class="influencer-card" src="https://picsum.photos/200/300?5">
<img class="influencer-card" src="https://picsum.photos/200/300?6">

</div>
</section>

<!-- 🔥 BRANDS -->
<section class="brands">
<div class="slider">

<img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Flipkart_logo.png">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Samsung_Logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Puma_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Flipkart_logo.png">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Samsung_Logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Puma_logo.svg">

</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Contact Us</h2>
<p>📞 +91 6387688790</p>
<a href="#" class="btn">Chat on WhatsApp</a>
</section>

<a href="#" class="whatsapp">💬</a>

<footer>© 2026 AdAvenueX</footer>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles-js", {
particles:{
number:{value:80},
size:{value:3},
move:{speed:2}
}
});
</script>

<!-- CURSOR -->
<script>
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});
</script>

</body>
</html>
